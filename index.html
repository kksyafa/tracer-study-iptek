<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracer Study IPTEK School Tangsel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-stat { transition: 0.3s; border: none; border-radius: 10px; color: white; }
        .card-stat:hover { transform: translateY(-5px); }
        .bg-gradient-primary { background: linear-gradient(45deg, #007bff, #0056b3); }
        .bg-gradient-success { background: linear-gradient(45deg, #28a745, #1e7e34); }
        .bg-gradient-warning { background: linear-gradient(45deg, #ffc107, #d39e00); color: #212529 !important; }
        .bg-gradient-info { background: linear-gradient(45deg, #17a2b8, #117a8b); }
        .table-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #adminPanel { display: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">🎓 Tracer Study IPTEK School</a>
    <button class="btn btn-outline-light btn-sm" onclick="toggleLogin()">Login Admin</button>
  </div>
</nav>

<div class="container mt-4">
    
    <div id="adminPanel" class="alert alert-warning border-0 shadow-sm">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <strong>Mode Admin:</strong> Silakan input data lulusan baru.
            </div>
            <a href="https://forms.gle/9xzU2cbZ9be8VQ4r5" target="_blank" class="btn btn-primary btn-sm">➕ Tambah Data Alumni</a>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-3 mb-3">
            <div class="card card-stat bg-gradient-primary p-3">
                <h5>Total Alumni</h5>
                <h2 id="totalAlumni">0</h2>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card card-stat bg-gradient-success p-3">
                <h5>Bekerja</h5>
                <h2 id="totalKerja">0</h2>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card card-stat bg-gradient-info p-3">
                <h5>Kuliah</h5>
                <h2 id="totalKuliah">0</h2>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card card-stat bg-gradient-warning p-3">
                <h5>Wirausaha</h5>
                <h2 id="totalWirausaha">0</h2>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-8">
            <div class="table-container h-100">
                <div class="row g-2 mb-3">
                    <div class="col-md-4">
                        <select id="filterTahun" class="form-select" onchange="applyFilter()">
                            <option value="">Semua Tahun Lulus</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select id="filterJurusan" class="form-select" onchange="applyFilter()">
                            <option value="">Semua Jurusan</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button onclick="downloadCSV()" class="btn btn-success w-100">📥 Download Data</button>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Nama</th>
                                <th>Tahun</th>
                                <th>Jurusan</th>
                                <th>Status</th>
                                <th>Detail (Tempat)</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="table-container h-100">
                <h5 class="text-center mb-3">Sebaran Alumni</h5>
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script>
    // --- KONFIGURASI ---
    // GANTI URL INI DENGAN LINK CSV DARI GOOGLE SHEETS (PUBLISH TO WEB)
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzwhla__ordfb45-gjdSxKzvDp0Xoyhoxqv3mlsprTWJHKwbTGj7VfKAiJsbAs3373mSuaWXORMf5A/pub?output=csv'; 

    let rawData = [];
    let myChart = null;

    // 1. Fetch Data saat halaman dimuat
    window.onload = function() {
        Papa.parse(SHEET_URL, {
            download: true,
            header: true,
            complete: function(results) {
                rawData = results.data;
                populateFilters();
                renderTable(rawData);
                updateStats(rawData);
            }
        });
    };

    // 2. Fungsi Render Tabel
    function renderTable(data) {
        const tbody = document.getElementById('dataTable');
        tbody.innerHTML = '';
        data.forEach(row => {
            if(!row['Nama Lengkap']) return; // Skip baris kosong
            let tr = `<tr>
                <td>${row['Nama Lengkap']}</td>
                <td>${row['Tahun Lulus']}</td>
                <td>${row['Jurusan']}</td>
                <td><span class="badge ${getStatusBadge(row['Status'])}">${row['Status']}</span></td>
                <td>${row['Nama Tempat']}</td>
            </tr>`;
            tbody.innerHTML += tr;
        });
    }

    // 3. Warna Badge Status
    function getStatusBadge(status) {
        if(!status) return 'bg-secondary';
        status = status.toLowerCase();
        if(status.includes('kerja')) return 'bg-success';
        if(status.includes('kuliah')) return 'bg-info';
        if(status.includes('wirausaha')) return 'bg-warning text-dark';
        return 'bg-secondary';
    }

    // 4. Update Statistik & Chart
    function updateStats(data) {
        let stats = { kerja: 0, kuliah: 0, wirausaha: 0, total: 0 };
        
        data.forEach(row => {
            if(!row['Status']) return;
            stats.total++;
            let s = row['Status'].toLowerCase();
            if(s.includes('kerja')) stats.kerja++;
            else if(s.includes('kuliah')) stats.kuliah++;
            else if(s.includes('wirausaha')) stats.wirausaha++;
        });

        document.getElementById('totalAlumni').innerText = stats.total;
        document.getElementById('totalKerja').innerText = stats.kerja;
        document.getElementById('totalKuliah').innerText = stats.kuliah;
        document.getElementById('totalWirausaha').innerText = stats.wirausaha;

        // Render Chart
        const ctx = document.getElementById('statusChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Bekerja', 'Kuliah', 'Wirausaha', 'Lainnya'],
                datasets: [{
                    data: [stats.kerja, stats.kuliah, stats.wirausaha, stats.total - (stats.kerja+stats.kuliah+stats.wirausaha)],
                    backgroundColor: ['#28a745', '#17a2b8', '#ffc107', '#6c757d']
                }]
            }
        });
    }

    // 5. Populate Filter Dropdown
    function populateFilters() {
        let tahunSet = new Set();
        let jurusanSet = new Set();
        rawData.forEach(row => {
            if(row['Tahun Lulus']) tahunSet.add(row['Tahun Lulus']);
            if(row['Jurusan']) jurusanSet.add(row['Jurusan']);
        });

        const selTahun = document.getElementById('filterTahun');
        const selJurusan = document.getElementById('filterJurusan');
        
        tahunSet.forEach(t => selTahun.innerHTML += `<option value="${t}">${t}</option>`);
        jurusanSet.forEach(j => selJurusan.innerHTML += `<option value="${j}">${j}</option>`);
    }

    // 6. Logic Filter
    function applyFilter() {
        const t = document.getElementById('filterTahun').value;
        const j = document.getElementById('filterJurusan').value;

        const filtered = rawData.filter(row => {
            return (t === '' || row['Tahun Lulus'] === t) &&
                   (j === '' || row['Jurusan'] === j);
        });

        renderTable(filtered);
        updateStats(filtered);
    }

    // 7. Download CSV
    function downloadCSV() {
        let csv = 'Nama,Tahun,Jurusan,Status,Tempat\n';
        // Ambil data yang sedang tampil (sudah terfilter atau belum)
        // Disini kita ambil rawData lalu filter ulang sesuai selection agar akurat
        const t = document.getElementById('filterTahun').value;
        const j = document.getElementById('filterJurusan').value;
        
        const dataToExport = rawData.filter(row => {
            return (t === '' || row['Tahun Lulus'] === t) &&
                   (j === '' || row['Jurusan'] === j);
        });

        dataToExport.forEach(row => {
            if(!row['Nama Lengkap']) return;
            csv += `"${row['Nama Lengkap']}","${row['Tahun Lulus']}","${row['Jurusan']}","${row['Status']}","${row['Nama Tempat']}"\n`;
        });

        const hiddenElement = document.createElement('a');
        hiddenElement.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
        hiddenElement.target = '_blank';
        hiddenElement.download = 'Data_Tracer_Study.csv';
        hiddenElement.click();
    }

    // 8. Simple Login Logic
    function toggleLogin() {
        // Ini adalah keamanan sederhana sisi klien (Client-side).
        // Jangan gunakan ini untuk data yang SANGAT rahasia.
        const pass = prompt("Masukkan Password Admin:");
        if(pass === "iptek123") { // GANTI PASSWORD DISINI
            document.getElementById('adminPanel').style.display = 'block';
            alert("Login Berhasil! Panel Admin terbuka.");
        } else {
            alert("Password Salah");
        }
    }
</script>

</body>
</html>
